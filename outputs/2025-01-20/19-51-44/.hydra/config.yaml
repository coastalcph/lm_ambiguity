output_path: results/true/gemma_output.tsv
model:
  _target_: vllm.LLM
  model: google/gemma-7b-it
  dtype: bfloat16
  tensor_parallel_size: 1
  max_model_len: 2048
  gpu_memory_utilization: 0.6
  quantization: null
  max_logprobs: 20
  enforce_eager: true
generation:
  _target_: vllm.SamplingParams
  max_tokens: 200
  temperature: 0.4
  top_k: 20
  top_p: 1.0
  logprobs: ${generation.top_k}
  prompt_logprobs: ${generation.top_k}
data:
  _target_: llm_inference.dataset.TsvTextDataset
  tsv_path: data/synt_ambig.tsv
  template_name: gemma_true
  text_column: sentence
  batch_size: 4
schema_name: ambiguity_check
enable_logprobs: false

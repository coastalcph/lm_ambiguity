output_path: llama-ambig/output_17-1.tsv
model:
  _target_: vllm.LLM
  model: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bfloat16
  tensor_parallel_size: 1
  max_model_len: 2488
  gpu_memory_utilization: 0.9
  quantization: null
  max_logprobs: 20
generation:
  _target_: vllm.SamplingParams
  max_tokens: 200
  temperature: 0.4
  top_k: 50
  top_p: 1.0
  logprobs: ${generation.top_k}
  prompt_logprobs: ${generation.top_k}
data:
  _target_: llm_inference.dataset.TsvTextDataset
  tsv_path: data/synt_ambig.tsv
  template_name: llama3_1
  text_column: sentence
  batch_size: 8
schema_name: ambiguity_check
enable_logprobs: false

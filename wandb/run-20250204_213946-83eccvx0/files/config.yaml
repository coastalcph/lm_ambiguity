data:
    value:
        _target_: llm_inference.dataset.TsvTextDataset
        batch_size: 8
        template_name: default/mixtral_default
        text_column: sentence
        tsv_path: data/ambient_premise.tsv
enable_logprobs:
    value: false
generation:
    value:
        _target_: vllm.SamplingParams
        logprobs: 20
        max_tokens: 200
        prompt_logprobs: 20
        temperature: 0.4
        top_k: 20
        top_p: 1
model:
    value:
        _target_: vllm.LLM
        dtype: bfloat16
        enforce_eager: true
        gpu_memory_utilization: 0.9
        max_logprobs: 20
        max_model_len: 2048
        model: mistralai/Mistral-7B-Instruct-v0.3
        quantization: null
        tensor_parallel_size: 1
output_path:
    value: output/default/mistral_premise.tsv
schema_name:
    value: ambiguity_check
